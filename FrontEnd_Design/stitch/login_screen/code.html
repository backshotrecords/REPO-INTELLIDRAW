<body class="bg-surface font-body text-on-surface antialiased">
<!-- Suppression of Nav Shells per Transactional Flow Rules -->
<main class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Background Aesthetic Elements -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-secondary-fixed/20 blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] rounded-full bg-tertiary-fixed/30 blur-[80px]"></div>
<div class="w-full max-w-md z-10 space-y-12">
<!-- Brand Anchor -->
<header class="flex flex-col items-center text-center">
<div class="mb-4">
<span class="material-symbols-outlined text-6xl text-primary" data-icon="draw" style="font-variation-settings: 'FILL' 1;">draw</span>
</div>
<h1 class="font-headline font-extrabold text-5xl tracking-tight text-primary">IntelliDraw</h1>
<p class="mt-4 text-on-surface-variant font-medium tracking-wide">Enter the Precision Atelier</p>
</header>
<!-- Login Form Section -->
<div class="space-y-8">
<div class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1 font-label">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-secondary transition-all outline-none placeholder:text-outline/50" placeholder="name@atelier.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant font-label">Password</label>
<a class="text-xs font-semibold text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-secondary transition-all outline-none placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="editorial-gradient w-full py-4 rounded-xl text-white font-headline font-bold text-lg active:scale-95 transition-transform duration-200 shadow-xl shadow-primary/10">
                    Log In
                </button>
<!-- AI Insight Tooltip Style Callout -->
<div class="bg-tertiary-container p-4 rounded-xl flex items-start gap-4">
<span class="material-symbols-outlined text-tertiary-fixed mt-0.5" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<p class="text-sm text-tertiary-fixed/90 leading-relaxed">
                        Sign in to access your AI-powered canvases and collaborative drafting tools.
                    </p>
</div>
</div>
<!-- Footer Links -->
<footer class="text-center">
<p class="text-on-surface-variant text-sm">
                    New to the studio? 
                    <a class="font-bold text-secondary ml-1 hover:underline" href="#">Sign Up</a>
</p>
</footer>
</div>
<!-- Canvas Preview - Background Decor -->
<div class="absolute bottom-12 right-12 hidden lg:block w-72 aspect-square rounded-2xl overflow-hidden shadow-2xl opacity-40 rotate-6 translate-y-12">
