<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>IntelliDraw Workspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#d7dadc",
                    "tertiary-fixed-dim": "#4cd6ff",
                    "secondary-fixed-dim": "#adc6ff",
                    "on-primary-fixed": "#0b1d2d",
                    "surface-variant": "#e0e3e5",
                    "primary-container": "#1a2b3c",
                    "on-secondary-container": "#fefcff",
                    "primary-fixed-dim": "#b7c8de",
                    "on-surface-variant": "#44474c",
                    "on-secondary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed": "#001f28",
                    "secondary-container": "#0070eb",
                    "on-tertiary-fixed-variant": "#004e60",
                    "inverse-surface": "#2d3133",
                    "background": "#f7fafc",
                    "on-tertiary-container": "#009dc1",
                    "tertiary-fixed": "#b7eaff",
                    "on-surface": "#181c1e",
                    "outline-variant": "#c4c6cd",
                    "on-primary-fixed-variant": "#38485a",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#ebeef0",
                    "primary": "#041627",
                    "on-secondary-fixed-variant": "#004493",
                    "inverse-on-surface": "#eef1f3",
                    "on-background": "#181c1e",
                    "surface-bright": "#f7fafc",
                    "tertiary-container": "#002e3a",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#e5e9eb",
                    "surface-container-highest": "#e0e3e5",
                    "error-container": "#ffdad6",
                    "surface": "#f7fafc",
                    "secondary-fixed": "#d8e2ff",
                    "inverse-primary": "#b7c8de",
                    "error": "#ba1a1a",
                    "outline": "#74777d",
                    "surface-container-low": "#f1f4f6",
                    "tertiary": "#001820",
                    "on-primary": "#ffffff",
                    "on-secondary-fixed": "#001a41",
                    "secondary": "#0058bc",
                    "primary-fixed": "#d2e4fb",
                    "surface-tint": "#4f6073"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .canvas-grid {
            background-image: 
                radial-gradient(circle at 1px 1px, #c4c6cd 1px, transparent 0);
            background-size: 24px 24px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface selection:bg-tertiary-fixed selection:text-on-tertiary-fixed overflow-hidden h-screen flex flex-col">
<header class="bg-white/90 backdrop-blur-md border-b border-outline-variant/30 sticky top-0 z-50">
<div class="flex flex-col w-full">
<div class="flex justify-between items-center px-4 py-3">
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-on-surface p-2 -ml-2 rounded-full active:bg-surface-container-high transition-colors">
                    menu
                </button>
<h1 class="font-manrope font-extrabold text-lg tracking-tight text-primary">IntelliDraw</h1>
</div>
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-on-surface-variant text-xl">share</button>
<div class="w-8 h-8 rounded-full border border-outline-variant/50 overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1W-jwCD_-vyFWlD_y6fx0PbmOARFEPS_2h2KmVPlVwkl1vWj-J6A_T9R8Qt2przyR0RwryGtRDEAwCF1A4AHWZRoacmgUVT9Jc68GKL18GO3xfH7gHv4nVprDnWEcZ__SITWc-nMlAjeP8PBhg0A1QqRIbr0I72S_oTb7oj72QoRwznSuQkym-z94_Ym54_JSVLf3cj5LwHeqr5K83sSvaC_p72kin94eQOmjFtSScr3Ylk7tI8MBwnZqElIF82GM8Etve3AvDUs"/>
</div>
</div>
</div>
<div class="px-4 pb-3">
<div class="bg-surface-container-low p-1 rounded-xl flex items-center w-full">
<button class="flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all bg-white text-secondary shadow-sm">
                    Flowchart
                </button>
<button class="flex-1 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all text-on-surface-variant/70 hover:bg-surface-container-high">
                    Mermaid Code
                </button>
</div>
</div>
</div>
</header>
<main class="relative flex-1 flex flex-col overflow-hidden">
<div class="flex-1 canvas-grid bg-surface relative overflow-auto no-scrollbar touch-pan-x touch-pan-y min-h-0">
<div class="fixed left-4 bottom-[180px] flex flex-col gap-2 z-40">
<div class="flex flex-col bg-white shadow-xl border border-outline-variant/30 rounded-full overflow-hidden">
<button class="p-3 hover:bg-surface-container text-on-surface-variant material-symbols-outlined text-xl">zoom_in</button>
<div class="h-px bg-outline-variant/20 mx-2"></div>
<button class="p-3 hover:bg-surface-container text-on-surface-variant material-symbols-outlined text-xl">zoom_out</button>
</div>
</div>
<div class="fixed right-4 top-1/2 -translate-y-1/2 z-40 flex flex-col items-center gap-4">
<div class="p-2 bg-white shadow-lg border border-outline-variant/30 rounded-2xl flex flex-col gap-3">
<div class="w-10 h-10 bg-surface-container-high rounded-xl flex items-center justify-center text-on-surface-variant/40">
<span class="material-symbols-outlined text-xl">rectangle</span>
</div>
<div class="w-10 h-10 bg-surface-container-high rounded-xl flex items-center justify-center text-on-surface-variant/40">
<span class="material-symbols-outlined text-xl">circle</span>
</div>
<div class="w-10 h-10 bg-primary shadow-lg shadow-primary/20 rounded-xl flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl font-bold">add</span>
</div>
</div>
</div>
<div class="relative min-h-full w-full flex flex-col items-center py-20 px-4">
<div class="group relative flex flex-col items-center w-full max-w-[240px]">
<div class="w-full p-4 bg-primary text-white rounded-xl shadow-lg border-b-4 border-black/20 text-center relative z-10">
<span class="font-headline font-bold text-sm">User Input Received</span>
</div>
<div class="h-12 w-px bg-outline-variant/60 relative">
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 border-t-6 border-t-outline-variant/60 border-x-4 border-x-transparent"></div>
<button class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-white border border-outline-variant/40 rounded-full flex items-center justify-center text-primary shadow-sm hover:scale-110 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">add</span>
</button>
</div>
</div>
<div class="flex flex-col items-center gap-4 w-full mb-12">
<div class="w-12 h-12 bg-secondary/5 border border-secondary/20 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-2xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="flex gap-4 w-full justify-center">
<div class="px-5 py-3 bg-white border border-outline-variant/30 rounded-xl shadow-sm text-center">
<span class="text-[10px] font-extrabold text-secondary uppercase tracking-widest">Pattern</span>
</div>
<div class="px-5 py-3 bg-white border border-outline-variant/30 rounded-xl shadow-sm text-center">
<span class="text-[10px] font-extrabold text-tertiary uppercase tracking-widest">AI Refine</span>
</div>
</div>
<div class="h-12 w-px bg-outline-variant/60 relative">
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 border-t-6 border-t-outline-variant/60 border-x-4 border-x-transparent"></div>
<button class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-white border border-outline-variant/40 rounded-full flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined text-sm font-bold">add</span>
</button>
</div>
</div>
<div class="group relative flex flex-col items-center w-full max-w-[240px]">
<div class="w-full p-4 bg-white border border-outline-variant/40 rounded-xl text-center shadow-sm relative z-10">
<span class="font-headline font-bold text-sm text-primary">Final Visualization</span>
</div>
<div class="h-16 w-px border-l-2 border-dashed border-secondary/40 relative">
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 border-t-6 border-t-secondary/40 border-x-4 border-x-transparent"></div>
</div>
</div>
<div class="flex flex-col items-center w-full max-w-[240px]">
<div class="w-full p-4 bg-secondary/5 border-2 border-dashed border-secondary/30 rounded-xl text-center relative group opacity-80">
<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-secondary text-white text-[9px] font-black uppercase tracking-tighter px-2 py-0.5 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[10px]">auto_awesome</span>
                        PROPOSED
                    </div>
<p class="text-xs font-medium text-secondary/80">Try adding a feedback loop to monitor results</p>
<button class="mt-3 px-4 py-2 bg-secondary text-white text-[10px] font-bold rounded-lg shadow-lg shadow-secondary/20">
                        APPLY CHANGE
                    </button>
</div>
</div>
</div>
</div>
<div class="bg-white border-t border-outline-variant/40 shadow-[0_-8px_30px_rgb(0,0,0,0.06)] z-30">
<div class="bg-primary/5 px-4 py-2 border-b border-outline-variant/20 flex items-center justify-between">
<div class="flex items-center gap-2 flex-1 min-w-0">
<span class="material-symbols-outlined text-secondary text-lg">psychology</span>
<p class="text-[11px] font-semibold text-on-surface-variant truncate">AI suggestion active in canvas flow</p>
</div>
<button class="text-secondary text-[10px] font-bold uppercase">Dismiss</button>
</div>
<div class="p-4 pb-8 flex items-center gap-3">
<div class="flex-1 relative">
<input class="w-full bg-surface-container-low border-none rounded-2xl px-5 py-4 text-sm font-medium placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-secondary/20 transition-all" placeholder="Refine flow..." type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant/30 text-xl">mic</span>
</div>
</div>
<button class="h-14 w-14 bg-primary text-white rounded-2xl flex items-center justify-center active:scale-90 transition-all shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</main>

</body></html>
